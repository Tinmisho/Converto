services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_MB=${MAX_FILE_MB:-100}
      - SECRET_KEY=${SECRET_KEY:-changeme}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  uploads:
  redis_data:
